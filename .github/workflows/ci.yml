name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Lint + type-check on every supported interpreter — cheap, no third-party wheels needed.
  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy

  # Full suite + benchmark on one modern pinned interpreter. `bench` pins pandas / scikit-learn
  # for the benchmark; `test` pins the packages the unit tests anchor on (numpy / openai /
  # requests) so a clean runner reproduces the verified env instead of the maintainer's local one.
  # One interpreter is enough to prove the property and avoids older-Python wheel-availability risk.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -e ".[dev,bench,test]"
      - run: pytest
