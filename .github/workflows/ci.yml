name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Lint + type-check on every supported interpreter — cheap, no third-party wheels needed.
  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy

  # Full suite + benchmark on one modern pinned interpreter. The benchmark needs pinned
  # pandas / scikit-learn to be meaningful but only needs a single interpreter to prove the
  # property, so this avoids a wheel-availability failure on an older Python with no added signal.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -e ".[dev,bench]"
      - run: pytest
